<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hero-section">
        <h1>✨ Explore Beautiful Destinations</h1>
        <p>
            A modern, responsive image carousel built with HTML, CSS, and JavaScript.
            Featuring autoplay, smooth animations, navigation controls, and interactive indicators.
        </p>
    </div>

    <div class="slider-container">

        <div class="slider">

            <div class="slide active">
                <img src="./assets/image1.webp" alt="Nature">
            </div>

            <div class="slide">
                <img src="./assets/image2.webp" alt="Mountain">
            </div>

            <div class="slide">
                <img src="./assets/image3.webp" alt="Ocean">
            </div>

            <div class="slide">
                <img src="./assets/image4.webp" alt="Beach">
            </div>

            <div class="slide">
                <img src="./assets/image5.webp" alt="Beach">
            </div>

            <div class="slide">
                <img src="./assets/image6.webp" alt="Beach">
            </div>

        </div>

        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>

        <div class="dots"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
